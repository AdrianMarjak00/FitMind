# Cloud Build configuration for FitMind Backend deployment to Cloud Run
steps:
  # Step 1: Build Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/fitmind:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/fitmind:latest'
      - '-f'
      - 'backend/Dockerfile'
      - 'backend/'
    id: 'build-image'

  # Step 2: Push Docker image to GCR
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/fitmind:$COMMIT_SHA'
    id: 'push-image'

  # Step 3: Push latest tag
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/fitmind:latest'
    id: 'push-latest'

  # Step 4: Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'fitmind'
      - '--image'
      - 'gcr.io/$PROJECT_ID/fitmind:$COMMIT_SHA'
      - '--region'
      - 'europe-west1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--set-env-vars'
      - 'ENV=production'
    id: 'deploy-cloud-run'

# Images to be stored in Container Registry
images:
  - 'gcr.io/$PROJECT_ID/fitmind:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/fitmind:latest'

# Build timeout
timeout: 1200s
