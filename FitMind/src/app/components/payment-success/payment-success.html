<section class="payment-success-page">
  <mat-card class="success-card">
    <div class="success-icon">
      <mat-icon>check_circle</mat-icon>
    </div>

    <h1>Platba bola úspešná!</h1>

    <p class="success-message">
      Ďakujeme za váš nákup. Váš tréningový plán je teraz aktívny a pripravený na použitie.
    </p>

    <div class="success-details">
      <div class="detail-item">
        <mat-icon>email</mat-icon>
        <span>Potvrdenie sme poslali na váš email</span>
      </div>
      <div class="detail-item">
        <mat-icon>fitness_center</mat-icon>
        <span>Plán je dostupný vo vašom profile</span>
      </div>
    </div>

    <div class="action-buttons">
      <button mat-raised-button color="primary" (click)="goToDashboard()">
        <mat-icon>dashboard</mat-icon>
        Prejsť na Dashboard
      </button>
      <button mat-stroked-button (click)="goToTraining()">
        <mat-icon>arrow_back</mat-icon>
        Späť na plány
      </button>
    </div>
  </mat-card>
</section>
